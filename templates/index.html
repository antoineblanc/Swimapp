<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwimTimer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #04080d; color: #e0edf5; font-family: 'DM Sans', sans-serif; min-height: 100vh; }
header { padding: 24px 40px; border-bottom: 1px solid rgba(0,170,255,0.1); display: flex; align-items: center; justify-content: space-between; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 40px; letter-spacing: 3px; background: linear-gradient(100deg, #0af, #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.badge { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; color: #0af; border: 1px solid rgba(0,170,255,0.2); padding: 5px 12px; border-radius: 2px; }
main { max-width: 800px; margin: 60px auto; padding: 0 24px; }

/* Upload */
#upload-section { text-align: center; }
h2 { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 3px; color: #0af; margin-bottom: 8px; }
p { color: rgba(224,237,245,0.4); font-size: 14px; margin-bottom: 32px; }

.drop-zone {
  border: 2px dashed rgba(0,170,255,0.3); border-radius: 8px;
  padding: 60px 32px; cursor: pointer; background: rgba(0,170,255,0.03);
  transition: all .2s; position: relative;
}
.drop-zone:hover { border-color: #0af; background: rgba(0,170,255,0.06); }
.drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.drop-icon { font-size: 48px; margin-bottom: 16px; }
.drop-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 3px; color: #0af; }
.drop-sub { font-size: 13px; color: rgba(224,237,245,0.3); margin-top: 6px; }

#file-list { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.fpill { background: rgba(0,170,255,0.08); border: 1px solid rgba(0,170,255,0.2); border-radius: 4px; padding: 6px 12px; font-family: 'DM Mono', monospace; font-size: 12px; color: #0af; display: flex; align-items: center; gap: 8px; }
.fpill button { background: none; border: none; color: rgba(224,237,245,0.3); cursor: pointer; font-size: 16px; }
.fpill button:hover { color: #f45; }

#analyse-btn {
  margin-top: 24px; width: 100%; padding: 18px;
  background: #0af; color: #000; border: none; border-radius: 4px;
  font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 4px;
  cursor: pointer; transition: all .15s; display: none;
}
#analyse-btn:hover { background: #2cf; }

/* Progress */
#progress-section { display: none; }
.prog-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: #0af; margin-bottom: 16px; }
.prog-bar-wrap { background: rgba(0,170,255,0.1); height: 4px; border-radius: 2px; margin-bottom: 20px; }
.prog-bar { height: 100%; background: linear-gradient(90deg, #0af, #0fe); width: 5%; border-radius: 2px; transition: width .5s; }
#log { background: rgba(255,255,255,0.02); border: 1px solid rgba(0,170,255,0.1); border-radius: 4px; padding: 16px; font-family: 'DM Mono', monospace; font-size: 12px; color: rgba(224,237,245,0.5); max-height: 200px; overflow-y: auto; line-height: 2; }

/* Results */
#results-section { display: none; }
.podium { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 32px; }
.pcard { flex: 1; min-width: 160px; background: rgba(255,255,255,0.03); border: 1px solid rgba(0,170,255,0.1); border-radius: 4px; padding: 16px; position: relative; }
.pcard::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: #0af; }
.pcard.p1::before { background: linear-gradient(90deg, #fc0, #0fe); }
.pcard-rank { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 3px; color: rgba(224,237,245,0.3); margin-bottom: 4px; }
.pcard-name { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; }
.pcard-time { font-family: 'DM Mono', monospace; font-size: 34px; color: #0af; line-height: 1; margin-top: 4px; }
.pcard.p1 .pcard-time { color: #0fe; }
.pcard-gap { font-family: 'DM Mono', monospace; font-size: 11px; color: #fc0; margin-top: 4px; }

.sec-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 4px; color: rgba(224,237,245,0.25); text-transform: uppercase; margin: 24px 0 12px; border-bottom: 1px solid rgba(0,170,255,0.08); padding-bottom: 8px; }

table { width: 100%; border-collapse: collapse; }
th { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; color: rgba(224,237,245,0.3); padding: 8px 12px; text-align: left; border-bottom: 1px solid rgba(0,170,255,0.08); }
th.sw { color: #0af; }
td { padding: 12px 12px; border-bottom: 1px solid rgba(0,170,255,0.04); }
.ph-name { font-size: 14px; font-weight: 600; }
.ph-desc { font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(224,237,245,0.3); margin-top: 2px; }
.t-best { font-family: 'DM Mono', monospace; font-size: 18px; color: #0fe; }
.t-slow { font-family: 'DM Mono', monospace; font-size: 18px; color: #fc0; }
.t-none { font-family: 'DM Mono', monospace; font-size: 18px; color: rgba(224,237,245,0.15); }
.t-gap { font-size: 11px; color: rgba(252,204,0,0.5); margin-left: 4px; }

.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.bar-name { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 1px; width: 120px; flex-shrink: 0; }
.bar-track { flex: 1; height: 28px; background: rgba(255,255,255,0.02); border-radius: 2px; display: flex; overflow: hidden; }
.bs { height: 100%; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 9px; overflow: hidden; white-space: nowrap; }
.bs span { padding: 0 3px; }
.b1 { background: rgba(255,200,0,0.75); color: #000; }
.b2 { background: rgba(0,170,255,0.75); color: #000; }
.b3 { background: rgba(0,100,200,0.6); color: #fff; }
.b4 { background: rgba(160,80,255,0.8); color: #fff; }
.b5 { background: rgba(0,255,200,0.6); color: #000; }
.bar-total { font-family: 'DM Mono', monospace; font-size: 12px; color: #0af; width: 55px; text-align: right; }

.legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
.leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: rgba(224,237,245,0.35); }
.ld { width: 10px; height: 10px; border-radius: 2px; }

#reset-btn { margin-top: 32px; background: transparent; border: 1px solid rgba(0,170,255,0.15); color: rgba(224,237,245,0.3); border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; padding: 10px 20px; cursor: pointer; width: 100%; }
#reset-btn:hover { border-color: #0af; color: #0af; }

.err { background: rgba(255,68,85,0.06); border: 1px solid rgba(255,68,85,0.2); border-radius: 4px; padding: 12px 16px; font-family: 'DM Mono', monospace; font-size: 12px; color: #f45; margin-bottom: 12px; }
</style>
</head>
<body>

<header>
  <div class="logo">SwimTimer</div>
  <div class="badge">POWERED BY CLAUDE VISION</div>
</header>

<main>

<div id="upload-section">
  <h2>50M PHASE ANALYSIS</h2>
  <p>Upload up to 5 swimming videos — AI automatically detects all split times</p>

  <div class="drop-zone" id="dropzone">
    <input type="file" id="fileinput" accept="video/*" multiple>
    <div class="drop-icon">🎬</div>
    <div class="drop-title">DROP VIDEO HERE</div>
    <div class="drop-sub">MP4 · MOV · AVI &nbsp;·&nbsp; up to 5 videos for comparison</div>
  </div>

  <div id="file-list"></div>
  <button id="analyse-btn">ANALYSE →</button>
</div>

<div id="progress-section">
  <div class="prog-title" id="prog-title">ANALYSING...</div>
  <div class="prog-bar-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  <div id="log"></div>
</div>

<div id="results-section">
  <div class="podium" id="podium"></div>
  <div class="sec-label">Phase Comparison</div>
  <div style="overflow-x:auto"><table id="tbl"></table></div>
  <div class="sec-label">Split Breakdown</div>
  <div class="legend">
    <div class="leg"><div class="ld b1"></div>Reaction</div>
    <div class="leg"><div class="ld b2"></div>La Coulée</div>
    <div class="leg"><div class="ld b3" style="background:rgba(0,100,200,0.6)"></div>First 25m</div>
    <div class="leg"><div class="ld b4"></div>Turn</div>
    <div class="leg"><div class="ld b5" style="background:rgba(0,255,200,0.6)"></div>Last 25m</div>
  </div>
  <div id="bars"></div>
  <button id="reset-btn">← ANALYSE ANOTHER VIDEO</button>
</div>

</main>

<script>
let files = [];

const dropzone = document.getElementById('dropzone');
const fileinput = document.getElementById('fileinput');
const fileList = document.getElementById('file-list');
const analyseBtn = document.getElementById('analyse-btn');

dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.style.borderColor='#0af'; });
dropzone.addEventListener('dragleave', () => { dropzone.style.borderColor=''; });
dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.style.borderColor=''; addFiles([...e.dataTransfer.files]); });
fileinput.addEventListener('change', () => addFiles([...fileinput.files]));

function addFiles(newFiles) {
  newFiles.forEach(f => {
    if (files.length >= 5) return;
    if (!f.type.startsWith('video/')) return;
    if (files.find(x => x.name === f.name)) return;
    files.push(f);
  });
  render();
}

function render() {
  fileList.innerHTML = files.map((f,i) => `
    <div class="fpill">🎬 ${f.name} <span style="opacity:.4">${(f.size/1024/1024).toFixed(0)}MB</span>
    <button onclick="removeFile(${i})">✕</button></div>`).join('');
  analyseBtn.style.display = files.length ? 'block' : 'none';
}

function removeFile(i) { files.splice(i,1); render(); }

analyseBtn.addEventListener('click', async () => {
  const form = new FormData();
  files.forEach(f => form.append('files', f));
  document.getElementById('upload-section').style.display = 'none';
  document.getElementById('progress-section').style.display = 'block';

  let jobId;
  try {
    const r = await fetch('/analyse', { method: 'POST', body: form });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || 'Upload failed');
    jobId = d.job_id;
  } catch(e) {
    showErr(e.message); return;
  }
  poll(jobId);
});

function poll(jobId) {
  let lastLen = 0, dots = 0;
  const iv = setInterval(async () => {
    try {
      const r = await fetch('/status/' + jobId);
      const d = await r.json();
      const log = document.getElementById('log');
      d.progress.slice(lastLen).forEach(line => {
        log.innerHTML += `<div>${line}</div>`;
        log.scrollTop = log.scrollHeight;
      });
      lastLen = d.progress.length;
      document.getElementById('prog-bar').style.width = (d.status==='done' ? 100 : Math.min(90, lastLen*8)) + '%';
      dots = (dots+1)%4;
      document.getElementById('prog-title').textContent = d.status==='done' ? 'COMPLETE ✓' : 'ANALYSING'+'.'.repeat(dots);
      if (d.status === 'done') {
        clearInterval(iv);
        setTimeout(() => showResults(d.results), 800);
      }
    } catch(e) {}
  }, 1500);
}

const PHASES = [
  {key:'reaction', icon:'⚡', label:'Reaction',  desc:'gun → entry'},
  {key:'coulee',   icon:'🌊', label:'La Coulée', desc:'entry → first stroke'},
  {key:'first_25', icon:'➡️', label:'First 25m', desc:'gun → wall touch'},
  {key:'turn',     icon:'🔄', label:'Turn',      desc:'touch → push off'},
  {key:'last_25',  icon:'🏆', label:'Last 25m',  desc:'push off → finish'},
  {key:'total',    icon:'🏁', label:'TOTAL',     desc:'gun → finish'},
];

function fmt(v) { return v != null ? v.toFixed(2)+'s' : '—'; }
function bestVal(swimmers, key) {
  const vals = swimmers.map(s=>s[key]).filter(v=>v!=null);
  return vals.length ? Math.min(...vals) : null;
}

function showResults(swimmers) {
  document.getElementById('progress-section').style.display = 'none';
  document.getElementById('results-section').style.display = 'block';

  const sorted = [...swimmers].filter(s=>!s.error||s.total!=null).sort((a,b)=>(a.total||999)-(b.total||999));

  // podium
  const pod = document.getElementById('podium');
  pod.innerHTML = '';
  swimmers.filter(s=>s.error).forEach(s => {
    pod.innerHTML += `<div class="err">⚠ ${s.name}: ${s.error}</div>`;
  });
  sorted.forEach((s,i) => {
    const gap = i>0 && sorted[0].total && s.total ? `+${(s.total-sorted[0].total).toFixed(2)}s` : '';
    pod.innerHTML += `<div class="pcard ${i===0?'p1':''}">
      <div class="pcard-rank">#${i+1}${i===0?' · FASTEST':''}</div>
      <div class="pcard-name">${s.name}</div>
      <div class="pcard-time">${fmt(s.total)}</div>
      ${gap?`<div class="pcard-gap">${gap}</div>`:''}
    </div>`;
  });

  // table
  const tbl = document.getElementById('tbl');
  let h = '<thead><tr><th>Phase</th>';
  sorted.forEach(s => h += `<th class="sw">${s.name}</th>`);
  h += '</tr></thead><tbody>';
  PHASES.forEach(ph => {
    const b = bestVal(sorted, ph.key);
    h += `<tr><td><div class="ph-name">${ph.icon} ${ph.label}</div><div class="ph-desc">${ph.desc}</div></td>`;
    sorted.forEach(s => {
      const v = s[ph.key];
      const isBest = b!=null && v!=null && Math.abs(v-b)<0.005;
      const gap = !isBest && b!=null && v!=null ? `<span class="t-gap">+${(v-b).toFixed(2)}</span>` : '';
      const cls = v==null ? 't-none' : isBest ? 't-best' : 't-slow';
      h += `<td class="${cls}">${v!=null ? v.toFixed(2)+'s'+gap : '—'}</td>`;
    });
    h += '</tr>';
  });
  tbl.innerHTML = h + '</tbody>';

  // bars
  const maxT = Math.max(...sorted.map(s=>s.total||0));
  const bars = document.getElementById('bars');
  bars.innerHTML = '';
  sorted.forEach(s => {
    const swim = Math.max(0,(s.first_25||0)-(s.reaction||0)-(s.coulee||0));
    const segs = [
      {v:s.reaction, c:'b1'},{v:s.coulee,c:'b2'},{v:swim,c:'b3'},{v:s.turn,c:'b4'},{v:s.last_25,c:'b5'}
    ];
    let segHtml = '';
    segs.forEach(seg => {
      if (!seg.v||seg.v<=0) return;
      const pct = (seg.v/maxT*100).toFixed(1);
      segHtml += `<div class="bs ${seg.c}" style="width:${pct}%"><span>${seg.v.toFixed(1)}s</span></div>`;
    });
    bars.innerHTML += `<div class="bar-row">
      <div class="bar-name">${s.name}</div>
      <div class="bar-track">${segHtml}</div>
      <div class="bar-total">${fmt(s.total)}</div>
    </div>`;
  });
}

function showErr(msg) {
  document.getElementById('progress-section').style.display = 'none';
  document.getElementById('upload-section').style.display = 'block';
  document.getElementById('upload-section').insertAdjacentHTML('afterbegin', `<div class="err">✗ ${msg}</div>`);
  files = []; render();
}

document.getElementById('reset-btn').addEventListener('click', () => {
  files = []; render();
  document.getElementById('results-section').style.display = 'none';
  document.getElementById('upload-section').style.display = 'block';
  fileinput.value = '';
});
</script>
</body>
</html>
